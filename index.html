  <body>
    <div class="site-loader" id="site-loader" role="status" aria-label="页面加载中">
      <div class="loader-wash"></div>
      <div class="loader-spinner">
        <span class="loader-frame loader-frame-a"></span>
        <span class="loader-frame loader-frame-b"></span>
        <span class="loader-core"></span>
        <span class="loader-monogram">Z &amp; L</span>

    <main class="swiper wedding-swiper">
      <div class="swiper-wrapper">
        <section class="swiper-slide cover-slide">
          <div class="cover-bg" data-swiper-parallax="-24%"></div>
          <div class="cover-vignette"></div>
          <div class="cover-content" data-swiper-parallax="-180">
            <p class="eyebrow">Wedding Invitation</p>
            <h1>Z & L</h1>
            <div class="typed-line">
              <span id="typed-cover"></span>
            </div>
            <p class="date">2026.10.06</p>
          </div>
          <button class="scroll-hint" type="button" aria-label="向下翻页">
            <span></span>
          </button>
        </section>

        <section class="swiper-slide story-slide layout-01">
          <div class="slide-bg"></div>
          <div class="content-grid">
            <figure class="photo-stack" data-swiper-parallax="-120">
              <picture>
                <source media="(max-width: 760px)" srcset="/src/assets/4.png">
                <img src="/src/assets/1.jpg" alt="新人的照片">
              </picture>
              <figcaption>Our Story</figcaption>
            </figure>
            <article class="copy-block" data-swiper-parallax="-260">
              <p class="section-index">01</p>
              <h2>初见</h2>
              <p id="typed-story"></p>
            </article>
          </div>
        </section>

        <section class="swiper-slide gallery-slide layout-02">
          <div class="slide-bg light-bg"></div>
          <div class="gallery-layout">
            <article class="copy-block" data-swiper-parallax="-220">
              <p class="section-index">02</p>
              <h2>同行</h2>
              <p id="typed-gallery"></p>
            </article>
            <div class="photo-collage" data-swiper-parallax="-120">
              <picture class="photo-main">
                <source media="(max-width: 760px)" srcset="/src/assets/5.jpg">
                <img src="/src/assets/2.png" alt="婚礼照片">
              </picture>
              <picture class="photo-side">
                <source media="(max-width: 760px)" srcset="/src/assets/1.jpg">
                <img src="/src/assets/3.jpg" alt="婚礼照片">
              </picture>
            </div>
          </div>
        </section>

        <section class="swiper-slide story-slide memory-slide layout-03">
          <div class="slide-bg"></div>
          <div class="content-grid">
            <figure class="photo-stack" data-swiper-parallax="-120">
              <picture>
                <source media="(max-width: 760px)" srcset="/src/assets/2.png">
                <img src="/src/assets/3.jpg" alt="我们的婚礼照片">
              </picture>
              <figcaption>Knowing You</figcaption>
            </figure>
            <article class="copy-block" data-swiper-parallax="-260">
              <p class="section-index">03</p>
              <h2>相知</h2>
              <p id="typed-knowing"></p>
            </article>
          </div>
        </section>

        <section class="swiper-slide gallery-slide memory-slide layout-04">
          <div class="slide-bg light-bg"></div>
          <div class="gallery-layout">
            <article class="copy-block" data-swiper-parallax="-220">
              <p class="section-index">04</p>
              <h2>相伴</h2>
              <p id="typed-together"></p>
            </article>
            <div class="photo-collage" data-swiper-parallax="-120">
              <picture class="photo-main">
                <source media="(max-width: 760px)" srcset="/src/assets/4.png">
                <img src="/src/assets/1.jpg" alt="我们的婚礼照片">
              </picture>
              <picture class="photo-side">
                <source media="(max-width: 760px)" srcset="/src/assets/3.jpg">
                <img src="/src/assets/2.png" alt="我们的婚礼照片">

            </div>
          </div>

        <section class="swiper-slide story-slide memory-slide layout-05">
          <div class="slide-bg"></div>
          <div class="content-grid">
            <figure class="photo-stack" data-swiper-parallax="-120">
              <picture>
                <source media="(max-width: 760px)" srcset="/src/assets/5.jpg">
                <img src="/src/assets/4.png" alt="我们的婚礼照片">
              </picture>
              <figcaption>Forever</figcaption>

            <article class="copy-block" data-swiper-parallax="-260">
              <p class="section-index">05</p>
              <h2>此刻</h2>
              <p id="typed-moment"></p>

          <div class="details-bg"></div>

            <p class="eyebrow">Save The Date</p>

            <div class="detail-list">
              <p><span>时间</span>2026 年 10 月 6 日 18:00</p>
              <p><span>地点</span>XX 酒店顶层宴会厅</p>
              <p><span>新人</span>Z & L</p>
            </div>
            <form class="rsvp-form" data-api-url="https://test-d3gh31yg6e4761523-1259647645.ap-shanghai.app.tcloudbase.com/submitRsvp" novalidate>
              <label>
                <span>姓名</span>
                <input name="name" type="text" autocomplete="name" placeholder="请输入您的姓名" required>
              </label>
              <label>
                <span>电话</span>
                <input name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="请输入联系电话" required>
              </label>
              <label>
                <span>出席人数</span>
                <input name="guestCount" type="number" inputmode="numeric" min="1" max="20" step="1" value="1" required>
              </label>
              <button type="submit">提交回执</button>
              <p class="rsvp-message" aria-live="polite"></p>
            </form>
          </div>
        </section>
      </div>
      <div class="swiper-pagination"></div>

    <div class="petal-layer" aria-hidden="true"></div>

    <aside class="music-widget">
      <button class="music-toggle" type="button" aria-label="打开背景音乐" aria-expanded="false" aria-controls="music-panel">
        <span class="music-preview">
          <img src="/src/assets/1.jpg" alt="">
          <span class="music-play-icon" aria-hidden="true"></span>
        </span>
        <span class="music-tab" aria-hidden="true"></span>
      </button>
      <div class="music-panel" id="music-panel" hidden>
        <button class="music-close" type="button" aria-label="收起背景音乐"></button>
        <div class="music-panel-head">
          <span>Till I Die</span>
          <small>TheBluelee</small>
        </div>
        <audio class="music-audio" controls autoplay loop preload="auto"></audio>
